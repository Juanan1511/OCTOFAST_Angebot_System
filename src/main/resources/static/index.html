<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angebot System - New Quote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Create New Pricing</h1>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5>Settings</h5>
                    <label class="form-label">Customer</label>
                    <select id="customerSelect" class="form-select mb-3"></select>

                    <label class="form-label">Factor</label>
                    <select id="factorSelect" class="form-select mb-3"></select>

                    <label class="form-label">Description</label>
                    <input type="text" id="quoteDesc" class="form-control" placeholder="Office Quote #1">
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Products</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Qty</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody id="productTable"></tbody>
                        </table>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <h4>Total Estimate: $<span id="displayTotal">0.00</span></h4>
                        <button class="btn btn-primary btn-lg" onclick="submitQuote()">Generate Pricing</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
